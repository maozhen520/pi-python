[project]
name = "pi_tui"
version = "0.1.0"
description = "Textual widgets and layouts for the pi-python coding CLI"
requires-python = ">=3.11"
dependencies = [
    "pi_agent",
    "textual>=8.2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_tui"]

[tool.uv.sources]
pi_agent = { workspace = true }

[dependency-groups]
dev = [
    "pytest-asyncio>=1.4.0",
]
