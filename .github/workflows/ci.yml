name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Typecheck
        run: uv run ty check

      - name: Pytest
        run: uv run pytest
